services:
  postgres:
    image: postgres:16-alpine
    container_name: copa-fisei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: copa_fisei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d copa_fisei"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
        reservations:
          memory: 64M
          cpus: "0.10"

volumes:
  postgres_data:
